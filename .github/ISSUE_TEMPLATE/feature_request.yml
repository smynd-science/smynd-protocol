name: Feature request
description: Suggest a protocol, docs, SDK, CLI, or contract improvement
title: "Feature: "
labels: ["type: feature", "status: proposed"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?
    validations:
      required: true
